<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}VBox-Manage{% endblock %}</title>
    <style>
        body { font-family: sans-serif; margin: 1rem 2rem; }
        .flash { padding: 0.5rem 1rem; margin-bottom: 1rem; border-radius: 4px; }
        .flash.success { background: #d4edda; color: #155724; }
        .flash.error { background: #f8d7da; color: #721c24; }
        table { border-collapse: collapse; width: 100%; max-width: 600px; }
        th, td { border: 1px solid #ddd; padding: 0.5rem 0.75rem; text-align: left; }
        th { background: #f5f5f5; }
        form { display: inline; }
        button, .btn { padding: 0.35rem 0.75rem; cursor: pointer; margin-right: 0.25rem; }
        .btn-start { background: #28a745; color: white; border: none; border-radius: 4px; }
        .btn-stop { background: #dc3545; color: white; border: none; border-radius: 4px; }
        .btn-graceful { background: #fd7e14; color: white; border: none; border-radius: 4px; }
        button:disabled { opacity: 0.45; cursor: not-allowed; }
        a { color: #007bff; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <h1>VBox-Manage</h1>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
    {% block extra_js %}{% endblock %}
</body>
</html>
